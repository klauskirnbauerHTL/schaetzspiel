<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Schätzspiel</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrap">
    <h1>Schätzspiel</h1>

    <div class="grid">
      <section class="card">
        <h2>Tipps erfassen</h2>

        <div class="topbar">
          <div class="toolbar" style="align-items:end;margin:0">
            <button class="btn danger" id="resetBtn">Löschen</button>
          </div>
        </div>

        <div class="legend">
          Es erscheint immer nur eine aktive Eingabezeile. Erst wenn die aktuelle Person bestätigt ist, erscheint die nächste.
        </div>

        <div class="table-wrap">
          <table>
            <tbody id="guessRows"></tbody>
          </table>
        </div>

        <div class="history-panel">
          <h3>Verlauf</h3>
          <div id="historyContainer" class="history-list"></div>
        </div>
      </section>

      <section class="card">
        <h2>Ergebnis & Auswertung</h2>

        <div class="mini-grid">
          <div>
            <label for="result"><strong>Ergebnis</strong></label>
            <input id="result" type="number" step="any" placeholder="Endergebnis eingeben" />
          </div>
          <div>
            <label for="rankingSize"><strong>Ranking-Größe</strong></label>
            <input id="rankingSize" type="number" min="1" value="10" />
          </div>

        </div>

        <div class="toolbar">
          <button class="btn" id="evaluateBtn">Tippspiel auswerten</button>
          <button class="btn secondary" id="exportBtn">CSV exportieren</button>
        </div>

        <div class="status" id="statusBox">Noch keine Auswertung.</div>
        <div id="rankingContainer"></div>
      </section>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
